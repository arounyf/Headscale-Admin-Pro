# Headscale + hs-admin (Headscale-Admin-Pro) 反向代理配置模板
#
# 架构说明：
#   - hs-admin Flask 管理后台: http://127.0.0.1:5000
#   - Headscale 控制服务器:   http://127.0.0.1:8080
#   - Nginx 作为统一 HTTPS 入口
#
# 节点注册说明：
#   在 headscale 配置 admin_url 后，注册链接自动指向管理后台。
#   无需在 nginx 中为 /register/ 路径做特殊转发。
#   若未配置 admin_url，headscale 内置页面直接处理注册。
#
#   headscale 配置示例:
#     server_url: https://hs.example.com
#     admin_url:  https://admin.example.com   # 可选，指向管理后台

map $http_upgrade $connection_upgrade {
    default      keep-alive;
    'websocket'  upgrade;
    ''           close;
}

server {
    listen  80;
    # listen  443 ssl;
    server_name  hs.example.com;

    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        # rewrite ^(/.*)$ https://$host$1 permanent;
    }

    # ---- hs-admin Flask 管理后台 ----
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Headscale 客户端连接端点 ----
    location ~ ^/(health|oidc|windows|apple|key|derp|bootstrap-dns|swagger|ts2021|machine) {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $server_name;
        proxy_buffering off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    }

    #PROXY-END/

    # ssl_certificate  /etc/nginx/ssl/hs.example.com.crt;
    # ssl_certificate_key  /etc/nginx/ssl/hs.example.com.key;
}
