# If you plan to somehow use headscale, please deploy your own DERP infra: https://tailscale.com/kb/1118/custom-derp-servers/
regions:
  900:
    regionid: 900
    regioncode: localhost
    regionname: localhost
    nodes:
      - name: 900a
        regionid: 900
        hostname: localhost
        stunport: 3478
        stunonly: false
        derpport: 12340
