services:  
  hs-admin3:
    # image: runyf/hs-admin:latest
    image: hs-admin3
    container_name: hs-admin3  
    network_mode: host
    restart: unless-stopped  
    volumes:  
      - ./app:/app
      - ./config:/etc/headscale
      - ./data:/var/lib/headscale

    environment:
      - TZ=Asia/Shanghai
      - FLASK_DEBUG=False
