<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找回密码</title>
  <link href="/static/layui/css/layui.css" rel="stylesheet">
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
</head>
<body>
<style>
.demo-login-container{width: 320px; margin: 21px auto 0;}
h2{margin-top:100px;margin-bottom:50px;text-align:center;font-weight:300;font-size:30px}
#captchaImage{width:120px;height:36px}
</style>
<h2>找回密码</h2>
<form class="layui-form">
  <div class="demo-login-container">
    <div class="layui-form-item">
      <div class="layui-input-wrap">
        <div class="layui-input-prefix">
          <i class="layui-icon layui-icon-username"></i>
        </div>
        <input type="text" name="username" value="" lay-verify="required" placeholder="用户名" lay-reqtext="请填写用户名" autocomplete="off" class="layui-input" lay-affix="clear">
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-input-wrap">
        <div class="layui-input-prefix">
          <i class="layui-icon layui-icon-email"></i>
        </div>
        <input type="text" name="email" value="" lay-verify="required|email" placeholder="注册邮箱" lay-reqtext="请填写注册邮箱" autocomplete="off" class="layui-input" lay-affix="clear">
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-input-wrap">
        <div class="layui-input-prefix">
          <i class="layui-icon layui-icon-cellphone"></i>
        </div>
        <input type="text" name="phone" value="" lay-verify="required|phone" placeholder="注册手机号" lay-reqtext="请填写注册手机号" autocomplete="off" class="layui-input" lay-affix="clear">
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-row">
        <div class="layui-col-xs7">
          <div class="layui-input-wrap">
            <div class="layui-input-prefix">
              <i class="layui-icon layui-icon-vercode"></i>
            </div>
            <input type="text" name="vercode" value="" lay-verify="required" placeholder="验证码" lay-reqtext="请填写验证码" autocomplete="off" class="layui-input" lay-affix="clear">
          </div>
        </div>
        <div class="layui-col-xs5">
          <div style="margin-left: 10px;">
            <img src="" id="captchaImage">
          </div>
        </div>
      </div>
    </div>
    <div class="layui-form-item">
      <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="forgot">发送重置邮件</button>
    </div>
    <div class="layui-form-item" style="text-align:center">
      <a href="./login">返回登录</a>
    </div>
  </div>
</form>

<script src="/static/layui/layui.js"></script>
<script src="/static/csrf.js"></script>
<script>

function generateUUID(){
    var d = new Date().getTime();
    var uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = (d + Math.random()*16)%16 | 0;
      d = Math.floor(d/16);
      return (c=='x' ? r : (r&0x3|0x8)).toString(16);
    });
    return uuid;
}

layui.use(function(){
  var form = layui.form, layer = layui.layer, $ = layui.$;
  var captcha_uuid = generateUUID();

  document.getElementById('captchaImage').src = '/get_captcha?captcha_uuid=' + captcha_uuid;
  $('#captchaImage').click(function(){
      captcha_uuid = generateUUID();
      document.getElementById('captchaImage').src = '/get_captcha?captcha_uuid=' + captcha_uuid;
  });

  form.on('submit(forgot)', function(data){
    var btn = $(this).find('button[lay-submit]');
    var origText = btn.text();
    btn.text('发送中...').prop('disabled', true);
    data.field['captcha_uuid'] = captcha_uuid;
    $.ajax({
      url:'./forgot-password', type:'post', data:data.field, dataType:'json',
      success:function(res){
        if(res.code == 0){
          layer.msg(res.msg, {icon: 6});
          btn.text('已发送');
          setTimeout(function(){ location.href="login" }, 2000);
        }else{
          layer.msg(res.msg, {icon: 7});
          btn.text(origText).prop('disabled', false);
          captcha_uuid = generateUUID();
          document.getElementById('captchaImage').src = '/get_captcha?captcha_uuid=' + captcha_uuid;
        }
      },
      error:function(){
        layer.msg('网络异常', {icon: 7});
        btn.text(origText).prop('disabled', false);
      }
    });
    return false;
  });
});
</script>
</body>
</html>
