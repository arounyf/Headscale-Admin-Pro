{% extends "base.html" %}
{% block title %}找回密码 - Headscale-Admin-Pro{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-950 px-4">
  <div class="w-full max-w-sm" x-data="forgotForm">
    <h2 class="text-3xl font-light text-center mb-10 text-gray-700 dark:text-gray-300">找回密码</h2>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-8 space-y-5">
      <!-- 用户名 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">用户名</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </span>
          <input type="text" x-model="username" placeholder="用户名" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        </div>
      </div>

      <!-- 邮箱 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">注册邮箱</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
          <input type="text" x-model="email" placeholder="注册邮箱" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        </div>
      </div>

      <!-- 验证码 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">验证码</label>
        <div class="flex gap-2">
          <div class="relative flex-1">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </span>
            <input type="text" x-model="vercode" placeholder="验证码" autocomplete="off" maxlength="4" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
          </div>
          <img :src="captchaSrc" @click="refreshCaptcha" class="w-[120px] h-[38px] rounded-lg cursor-pointer border dark:border-gray-600 flex-shrink-0" title="点击刷新">
        </div>
      </div>

      <!-- 发送按钮 -->
      <button @click="doSubmit" :disabled="loading" class="w-full py-2.5 rounded-lg bg-primary-500 text-white font-medium text-sm hover:bg-primary-600 disabled:opacity-50 transition-colors" x-text="loading ? '发送中...' : '发送重置邮件'"></button>

      <div class="text-center">
        <a href="./login" class="text-xs text-gray-500 hover:text-primary-500">返回登录</a>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('forgotForm', () => ({
    username: '', email: '', vercode: '',
    loading: false,
    captchaSrc: '', captcha_uuid: '',

    init() { this.refreshCaptcha(); },

    genUUID() {
      var d = new Date().getTime();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = (d + Math.random()*16)%16 | 0;
        d = Math.floor(d/16);
        return (c=='x' ? r : (r&0x3|0x8)).toString(16);
      });
    },

    refreshCaptcha() {
      this.captcha_uuid = this.genUUID();
      this.captchaSrc = '/get_captcha?captcha_uuid=' + this.captcha_uuid;
    },

    async doSubmit() {
      if (!this.username) { showToast('请输入用户名', 'warning'); return; }
      if (!this.email) { showToast('请输入邮箱地址', 'warning'); return; }
      if (!this.vercode) { showToast('请输入验证码', 'warning'); return; }

      this.loading = true;
      try {
        const fd = new URLSearchParams();
        fd.append('username', this.username);
        fd.append('email', this.email);
        fd.append('vercode', this.vercode);
        fd.append('captcha_uuid', this.captcha_uuid);

        const res = await apiPost('./forgot-password', fd);
        if (res.code === '0') {
          showToast(res.msg, 'success');
          setTimeout(() => { location.href = 'login'; }, 2000);
        } else {
          showToast(res.msg, 'error');
          this.refreshCaptcha();
        }
      } catch(e) { showToast('网络异常', 'error'); }
      this.loading = false;
    }
  }));
});
</script>
{% endblock %}
