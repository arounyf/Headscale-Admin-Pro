{% extends "base.html" %}
{% block title %}注册 - Headscale-Admin-Pro{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-950 px-4">
  <div class="w-full max-w-sm" x-data="regForm">
    <h2 class="text-3xl font-light text-center mb-8 text-gray-700 dark:text-gray-300">账户注册</h2>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-8 space-y-5">
      <!-- 用户名 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">用户名</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </span>
          <input type="text" x-model="username" placeholder="用户名（字母开头）" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        </div>
      </div>

      <!-- 手机号 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">手机号</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          </span>
          <input type="text" x-model="phone" placeholder="手机号码" autocomplete="off" maxlength="11" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        </div>
      </div>

      <!-- 邮箱 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">邮箱</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </span>
          <input type="text" x-model="email" placeholder="邮箱地址" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        </div>
      </div>

      <!-- 密码 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">密码</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-4V7a4 4 0 00-8 0v4"/></svg>
          </span>
          <input :type="showPwd ? 'text' : 'password'" x-model="password" placeholder="密码（3-20位）" autocomplete="off" class="w-full pl-10 pr-10 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
          <button type="button" @click="showPwd = !showPwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg x-show="!showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg x-show="showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>

      <!-- 确认密码 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">确认密码</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-4V7a4 4 0 00-8 0v4"/></svg>
          </span>
          <input type="password" x-model="confirmPassword" placeholder="确认密码" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        </div>
      </div>

      <!-- 验证码 / 邮箱验证码 -->
      <div>
        <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">验证码</label>
        <div class="flex gap-2">
          <div class="relative flex-1">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </span>
            <input type="text" x-model="vercode" placeholder="验证码" autocomplete="off" maxlength="4" class="w-full pl-10 pr-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
          </div>
          <!-- 图片验证码 -->
          <div x-show="!emailVerify" class="flex-shrink-0">
            <img :src="captchaSrc" @click="refreshCaptcha" class="w-[120px] h-[38px] rounded-lg cursor-pointer border dark:border-gray-600" title="点击刷新">
          </div>
          <!-- 邮箱验证码按钮 -->
          <button type="button" x-show="emailVerify" @click="sendEmailCode" :disabled="codeTimer > 0" class="flex-shrink-0 px-4 py-2 rounded-lg bg-primary-500 text-white text-sm font-medium hover:bg-primary-600 disabled:opacity-50 transition-colors" x-text="codeBtnText"></button>
        </div>
      </div>

      <!-- 用户协议 -->
      <div class="flex items-center gap-2">
        <input type="checkbox" x-model="agreement" id="agreement" class="w-4 h-4 rounded border-gray-300 text-primary-500 focus:ring-primary-500">
        <label for="agreement" class="text-xs text-gray-500">同意 <a href="#" class="text-primary-500">用户协议</a></label>
      </div>

      <!-- 注册按钮 -->
      <button @click="doReg" :disabled="loading" class="w-full py-2.5 rounded-lg bg-primary-500 text-white font-medium text-sm hover:bg-primary-600 disabled:opacity-50 transition-colors" x-text="loading ? '注册中...' : '注册'"></button>

      <div class="text-center">
        <a href="./login" class="text-xs text-gray-500 hover:text-primary-500">用已有帐号登入</a>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('regForm', () => ({
    username: '', phone: '', email: '', password: '', confirmPassword: '', vercode: '',
    showPwd: false, loading: false, agreement: false,
    captchaSrc: '', captcha_uuid: '',
    emailVerify: {{ 'true' if email_verify else 'false' }},
    codeTimer: 0, codeBtnText: '发送验证码',

    init() { if (!this.emailVerify) this.refreshCaptcha(); },

    genUUID() {
      var d = new Date().getTime();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = (d + Math.random()*16)%16 | 0;
        d = Math.floor(d/16);
        return (c=='x' ? r : (r&0x3|0x8)).toString(16);
      });
    },

    refreshCaptcha() {
      this.captcha_uuid = this.genUUID();
      this.captchaSrc = '/get_captcha?captcha_uuid=' + this.captcha_uuid;
    },

    async sendEmailCode() {
      if (!this.email) { showToast('请先填写邮箱', 'warning'); return; }
      this.codeBtnText = '发送中...';
      try {
        const fd = new URLSearchParams(); fd.append('email', this.email);
        const res = await apiPost('/send_email_code', fd);
        if (res.code === '0') { showToast('验证码已发送', 'success'); this.startCodeTimer(); }
        else { showToast(res.msg, 'error'); this.codeBtnText = '发送验证码'; }
      } catch(e) { showToast('发送失败', 'error'); this.codeBtnText = '发送验证码'; }
    },

    startCodeTimer() {
      this.codeTimer = 60;
      this.codeBtnText = '60秒后重发';
      var iv = setInterval(() => {
        this.codeTimer--;
        this.codeBtnText = this.codeTimer + '秒后重发';
        if (this.codeTimer <= 0) { clearInterval(iv); this.codeBtnText = '发送验证码'; }
      }, 1000);
    },

    async doReg() {
      if (!this.username || !this.phone || !this.email || !this.password || !this.confirmPassword || !this.vercode) {
        showToast('请填写完整信息', 'warning'); return;
      }
      if (this.password !== this.confirmPassword) { showToast('两次密码输入不一致', 'warning'); return; }
      if (!this.agreement) { showToast('您必须勾选同意用户协议才能注册', 'warning'); return; }

      this.loading = true;
      try {
        const fd = new URLSearchParams();
        fd.append('username', this.username);
        fd.append('phone', this.phone);
        fd.append('email', this.email);
        fd.append('password', this.password);
        fd.append('confirmPassword', this.confirmPassword);
        fd.append('vercode', this.vercode);
        fd.append('captcha_uuid', this.captcha_uuid);

        const res = await apiPost('./reg', fd);
        if (res.code === '0') {
          showToast(res.msg, 'success');
          setTimeout(() => { location.href = 'login?username=' + encodeURIComponent(this.username); }, 1200);
        } else {
          showToast(res.msg, 'error');
          if (!this.emailVerify) this.refreshCaptcha();
        }
      } catch(e) { showToast('网络异常', 'error'); }
      this.loading = false;
    }
  }));
});
</script>
{% endblock %}
