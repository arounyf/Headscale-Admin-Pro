<!DOCTYPE html>
<html lang="zh-CN" x-data="{ darkMode: localStorage.dark === 'true' }" x-init="$watch('darkMode', v => { localStorage.dark = v; document.documentElement.classList.toggle('dark', v) }); darkMode && document.documentElement.classList.add('dark')">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Headscale-Admin-Pro{% endblock %}</title>
  <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#4f46e5',600:'#4338ca',700:'#3730a3' }
        }
      }
    }
  }
  </script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <!-- Grid.js CDN -->
  <link href="https://cdn.jsdelivr.net/npm/gridjs@6.2.0/dist/theme/mermaid.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gridjs@6.2.0/dist/gridjs.umd.js"></script>

  <!-- 项目自定义 -->
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/csrf.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/modal.js"></script>

  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">

<!-- Toast 容器 -->
<div x-data="toastContainer" class="toast-container">
  <template x-for="t in toasts" :key="t.id">
    <div :class="bgClass(t.icon)" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-all duration-300" x-show="t" x-transition:enter="translate-x-2 opacity-0" x-transition:enter-end="translate-x-0 opacity-100">
      <span x-html="iconHtml(t.icon)"></span>
      <span x-text="t.msg" class="text-gray-800 dark:text-gray-200"></span>
      <button class="ml-4 text-gray-400 hover:text-gray-600" @click="remove(t.id)">&times;</button>
    </div>
  </template>
</div>

<!-- Modal -->
<div x-data="globalModal">
  <div x-show="show" class="modal-overlay" x-transition.opacity @click.self="close()">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden" x-transition.scale>
      <div class="flex items-center justify-between px-6 py-4 border-b dark:border-gray-700">
        <h3 class="text-lg font-semibold" x-text="title"></h3>
        <button @click="close()" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <div class="px-6 py-4" x-html="body"></div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t dark:border-gray-700" x-show="showFooter">
        <button @click="close()" class="px-4 py-2 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700" x-text="cancelText"></button>
        <button @click="confirm()" class="px-4 py-2 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600" x-text="confirmText"></button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm -->
<div x-data="globalConfirm">
  <div x-show="show" class="modal-overlay" x-transition.opacity @click.self="cancel()">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm mx-4 p-6" x-transition.scale>
      <div class="flex items-center gap-3 mb-4">
        <svg class="w-6 h-6 text-amber-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <p class="text-sm" x-text="msg"></p>
      </div>
      <div class="flex justify-end gap-3">
        <button @click="cancel()" class="px-4 py-2 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">取消</button>
        <button @click="confirm()" class="px-4 py-2 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600">确定</button>
      </div>
    </div>
  </div>
</div>

{% block body %}{% endblock %}

</body>
</html>
