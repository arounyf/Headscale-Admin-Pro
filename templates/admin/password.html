{% extends "base.html" %}
{% block title %}修改密码{% endblock %}

{% block body %}
<div class="p-6 max-w-lg" x-data="passwordForm">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 font-semibold">修改密码</div>
    <div class="p-6 space-y-4">
      <!-- 当前密码 -->
      <div>
        <label class="block text-sm text-gray-500 mb-1">当前密码</label>
        <div class="relative">
          <input :type="showOld ? 'text' : 'password'" x-model="oldPwd" placeholder="当前密码" class="w-full px-3 pr-10 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
          <button type="button" @click="showOld = !showOld" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <!-- 新密码 -->
      <div>
        <label class="block text-sm text-gray-500 mb-1">新密码</label>
        <input :type="showNew ? 'text' : 'password'" x-model="newPwd" placeholder="新密码（6-16个字符）" class="w-full px-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
        <p class="text-xs text-gray-400 mt-1">6到16个字符</p>
      </div>

      <!-- 确认新密码 -->
      <div>
        <label class="block text-sm text-gray-500 mb-1">确认新密码</label>
        <input :type="showConfirm ? 'text' : 'password'" x-model="confirmPwd" placeholder="确认新密码" class="w-full px-3 py-2.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none text-sm">
      </div>

      <button @click="doChange" :disabled="loading" class="px-6 py-2.5 rounded-lg bg-primary-500 text-white font-medium text-sm hover:bg-primary-600 disabled:opacity-50" x-text="loading ? '修改中...' : '确认修改'"></button>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('passwordForm', () => ({
    oldPwd: '', newPwd: '', confirmPwd: '',
    showOld: false, showNew: false, showConfirm: false,
    loading: false,

    async doChange() {
      if (!this.oldPwd || !this.newPwd || !this.confirmPwd) {
        showToast('请填写完整信息', 'warning'); return;
      }
      if (this.newPwd !== this.confirmPwd) {
        showToast('两次密码输入不一致', 'warning'); return;
      }
      this.loading = true;
      try {
        const fd = new URLSearchParams();
        fd.append('password', this.oldPwd);
        fd.append('new_password', this.newPwd);
        fd.append('confirmPassword', this.confirmPwd);
        const res = await apiPost('/password', fd);
        if (res.code === '0') {
          showToast(res.msg, 'success');
          setTimeout(() => { parent.location.href = '/login'; }, 1000);
        } else {
          showToast(res.msg, 'error');
        }
      } catch(e) { showToast('网络异常', 'error'); }
      this.loading = false;
    }
  }));
});
</script>
{% endblock %}
