{% extends "base.html" %}
{% block title %}预共享密钥{% endblock %}

{% block body %}
<div class="p-6" x-data="preauthkeyPage">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 flex items-center justify-between">
      <span class="font-semibold">预共享密钥中心</span>
      <div class="flex gap-2">
        <button @click="showAddModal = true" class="px-3 py-1.5 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600">新建</button>
        <button @click="refresh" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">刷新</button>
      </div>
    </div>
    <div class="p-4">
      <div id="preauthkey-table"></div>
    </div>
  </div>

  <!-- 新建密钥弹窗 -->
  <div x-show="showAddModal" class="modal-overlay" @click.self="showAddModal = false" x-transition.opacity>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6" x-transition.scale>
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold">新建预授权密钥</h3>
        <button @click="showAddModal = false" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <div class="space-y-4">
        <label class="flex items-center justify-between">
          <span class="text-sm">可复用 <span class="text-xs text-gray-400">(开：密钥可多次使用)</span></span>
          <input type="checkbox" x-model="addForm.reusable" class="w-4 h-4 rounded border-gray-300 text-primary-500">
        </label>
        <label class="flex items-center justify-between">
          <span class="text-sm">临时节点 <span class="text-xs text-gray-400">(开：节点离线后自动移除)</span></span>
          <input type="checkbox" x-model="addForm.ephemeral" class="w-4 h-4 rounded border-gray-300 text-primary-500">
        </label>
        <div class="flex items-center justify-between">
          <span class="text-sm">有效期</span>
          <select x-model="addForm.expireDays" class="px-3 py-1.5 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm">
            <option value="1">1 天</option>
            <option value="7">7 天</option>
            <option value="30">30 天</option>
            <option value="90">90 天</option>
            <option value="365">365 天</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button @click="showAddModal = false" class="px-4 py-2 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">取消</button>
        <button @click="doAdd" :disabled="adding" class="px-4 py-2 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600 disabled:opacity-50" x-text="adding ? '创建中...' : '确认创建'"></button>
      </div>
    </div>
  </div>

  <!-- 密钥展示弹窗 -->
  <div x-show="showKeyModal" class="modal-overlay" @click.self="showKeyModal = false" x-transition.opacity>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6" x-transition.scale>
      <div class="mb-4">
        <h3 class="font-semibold text-amber-500 mb-2">密钥只显示一次，请立即保存！</h3>
        <pre class="bg-gray-900 text-green-400 p-3 rounded-lg text-sm overflow-x-auto font-mono" x-text="newKey"></pre>
      </div>
      <div class="flex justify-end">
        <button @click="showKeyModal = false; showAddModal = false; refresh()" class="px-4 py-2 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600">我记住了</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('preauthkeyPage', () => ({
    grid: null,
    showAddModal: false,
    showKeyModal: false,
    newKey: '',
    adding: false,
    addForm: { reusable: true, ephemeral: false, expireDays: '7' },

    init() { this.buildTable(); },

    buildTable() {
      var self = this;
      var cols = [
        { name: 'ID', id: 'id', sort: true, width: '80px' },
        {% if current_user.role == 'manager' %}
        { name: '用户名', id: 'name', width: '150px' },
        {% endif %}
        { name: '密钥', id: 'key', width: '280px' },
        { name: '创建时间', id: 'create_time', width: '160px', sort: true },
        { name: '到期时间', id: 'expiration', width: '160px', sort: true },
        { name: '可复用', id: 'reusable', width: '80px', formatter: function(cell) { return gridjs.html(cell ? '<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400">是</span>' : '<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400">否</span>'); } },
        { name: '节点类型', id: 'ephemeral', width: '90px', formatter: function(cell) { return gridjs.html(cell ? '<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400">临时</span>' : '<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400">持久</span>'); } },
        { name: '操作', id: 'actions', width: '80px', sort: false, formatter: function(_, row) {
          var id = row.cells[0].data;
          return gridjs.html('<button class="text-red-500 hover:text-red-600 text-sm" onclick="document.dispatchEvent(new CustomEvent(\'preauthkey:del\', {detail:' + id + '}))">删除</button>');
        }}
      ];

      this.grid = new gridjs.Grid({
        columns: cols,
        server: {
          url: '/api/preauthkey/getPreAuthKey',
          then: function(data) {
            var list = data.data || [];
            return list.map(function(r) {
              return [r.id, {% if current_user.role == 'manager' %}r.name, {% endif %}r.key, r.create_time, r.expiration, r.reusable, r.ephemeral, null];
            });
          }
        },
        search: true,
        sort: { multiColumn: false },
        pagination: { limit: 15 },
        language: { search: { placeholder: '搜索...' }, pagination: { showing: '显示', to: '到', of: '共', results: '' } },
        style: { table: { 'white-space': 'nowrap' } },
        className: { table: 'text-sm' }
      }).render(document.getElementById('preauthkey-table'));

      // Delete handler
      document.addEventListener('preauthkey:del', function(e) {
        var keyId = e.detail;
        openConfirm('确认删除该密钥吗？', function() {
          apiPost('/api/preauthkey/delKey', { keyId: keyId }).then(function(res) {
            if (res.code === '0') { showToast(res.msg, 'success'); self.refresh(); }
            else { showToast(res.msg, 'error'); }
          });
        });
      });
    },

    async doAdd() {
      this.adding = true;
      try {
        var fd = new URLSearchParams();
        fd.append('reusable', this.addForm.reusable ? 'true' : 'false');
        fd.append('ephemeral', this.addForm.ephemeral ? 'true' : 'false');
        fd.append('expireDays', this.addForm.expireDays);
        var res = await apiPost('/api/preauthkey/addKey', fd);
        if (res.code === '0') {
          var data = JSON.parse(res.data);
          this.newKey = data.preAuthKey.key;
          this.showKeyModal = true;
        } else {
          showToast('创建失败: ' + res.msg, 'error');
        }
      } catch(e) { showToast('创建失败', 'error'); }
      this.adding = false;
    },

    refresh() {
      if (this.grid) this.grid.forceRender();
    }
  }));
});
</script>
{% endblock %}
