{% extends "base.html" %}
{% block title %}用户中心{% endblock %}

{% block body %}
<div class="p-6" x-data="userPage">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 flex items-center justify-between">
      <span class="font-semibold">用户中心</span>
      <div class="flex gap-2">
        <button @click="refresh" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">刷新</button>
        <button @click="toggleMultiRow" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">
          <span x-text="multiRow ? '单行' : '多行'"></span>
        </button>
      </div>
    </div>
    <div class="p-4">
      <div id="user-table"></div>
    </div>
  </div>

  <!-- 用户详情弹窗 -->
  <div x-show="showDetail" class="modal-overlay" @click.self="showDetail = false" x-transition.opacity>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-6" x-transition.scale>
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold">用户信息</h3>
        <button @click="showDetail = false" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <div x-html="detailContent" class="space-y-2 text-sm"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('userPage', () => ({
    grid: null, multiRow: false,
    showDetail: false, detailContent: '',

    init() { this.buildTable(); },

    buildTable() {
      var self = this;

      var cols = [
        { name: 'ID', id: 'id', sort: true, width: '80px' },
        { name: '用户名', id: 'userName', sort: true, width: '140px' },
        { name: '角色', id: 'role', width: '100px', formatter: function(cell) { return cell === 'manager' ? '<span class="text-primary-500 font-medium">超级管理员</span>' : '<span class="text-gray-500">普通用户</span>'; } },
        { name: '到期时间', id: 'expire', sort: true, width: '180px' },
        { name: '节点限制', id: 'node', width: '90px' },
        { name: '路由', id: 'route', width: '80px', sort: false, formatter: function(cell, row) {
          var cells = row.cells; var idIdx = 0; var id = cells[idIdx].data;
          var checked = cell === '1' ? 'checked' : '';
          return gridjs.html('<input type="checkbox" ' + checked + ' onchange="document.dispatchEvent(new CustomEvent(\'user:route\',{detail:{id:' + id + ', val: this.checked}}))" class="w-4 h-4 rounded border-gray-300 text-primary-500">');
        }},
        { name: '启用', id: 'enable', width: '80px', sort: false, formatter: function(cell, row) {
          var cells = row.cells; var idIdx = 0; var id = cells[idIdx].data;
          var checked = cell === '1' ? 'checked' : '';
          return gridjs.html('<input type="checkbox" ' + checked + ' onchange="document.dispatchEvent(new CustomEvent(\'user:enable\',{detail:{id:' + id + ', val: this.checked}}))" class="w-4 h-4 rounded border-gray-300 text-primary-500">');
        }},
        { name: '操作', id: 'actions', width: '120px', sort: false, formatter: function(_, row) {
          var cells = row.cells; var idIdx = 0; var data = { id: cells[idIdx].data, userName: cells[1].data, cellphone: cells[7] ? cells[7].data : '', email: cells[8] ? cells[8].data : '', createTime: cells[9] ? cells[9].data : '' };
          return gridjs.html('<button class="text-primary-500 hover:text-primary-600 text-sm mr-2" onclick="document.dispatchEvent(new CustomEvent(\'user:detail\',{detail:' + JSON.stringify(data).replace(/'/g, "&#39;") + '}))">查看</button><button class="text-red-500 hover:text-red-600 text-sm" onclick="document.dispatchEvent(new CustomEvent(\'user:del\',{detail:{id:' + cells[idIdx].data + '}}))">删除</button>');
        }},
      ];

      this.grid = new gridjs.Grid({
        columns: cols,
        server: {
          url: '/api/user/getUsers',
          then: function(data) {
            var list = data.data || [];
            return list.map(function(r) {
              return [r.id, r.userName, r.role, r.expire, r.node, r.route, r.enable, r.cellphone, r.email, r.createTime, null];
            });
          }
        },
        search: true,
        sort: { multiColumn: false },
        pagination: { limit: 15 },
        language: { search: { placeholder: '搜索...' }, pagination: { showing: '显示', to: '到', of: '共', results: '' } },
        style: { table: { 'white-space': 'nowrap' } },
        className: { table: 'text-sm' }
      }).render(document.getElementById('user-table'));

      // Events
      document.addEventListener('user:del', function(e) {
        openConfirm('确认删除该用户吗？', function() {
          apiPost('/api/user/delUser', { user_id: e.detail.id }).then(function(res) {
            if (res.code === '0') { showToast('删除成功', 'success'); self.refresh(); }
            else { showToast(res.msg, 'error'); }
          });
        });
      });

      document.addEventListener('user:detail', function(e) {
        var d = e.detail;
        self.detailContent = '<p><strong>手机号码：</strong>' + escapeHtml(d.cellphone || '') + '</p><p><strong>邮箱：</strong>' + escapeHtml(d.email || '') + '</p><p><strong>注册时间：</strong>' + escapeHtml(d.createTime || '') + '</p>';
        self.showDetail = true;
      });

      document.addEventListener('user:route', function(e) {
        apiPost('/api/user/route_enable', { user_id: e.detail.id, enable: e.detail.val }).then(function(res) {
          showToast(res.msg, res.code === '0' ? 'success' : 'error');
        });
      });

      document.addEventListener('user:enable', function(e) {
        apiPost('/api/user/user_enable', { user_id: e.detail.id, enable: e.detail.val }).then(function(res) {
          showToast(res.msg, res.code === '0' ? 'success' : 'error');
        });
      });
    },

    toggleMultiRow() { this.multiRow = !this.multiRow; this.buildTable(); },
    refresh() { if (this.grid) this.grid.forceRender(); }
  }));
});
</script>
{% endblock %}
