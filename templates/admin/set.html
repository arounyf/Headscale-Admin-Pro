<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>系统设置</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
  <link rel="stylesheet" href="/static/adminui/dist/css/admin.css" media="all">
</head>

  <body class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-col-md8">

        <div class="layui-form" wid100 lay-filter="">

          <div class="layui-card">
            <div class="layui-card-header">
              系统设置
              <span style="font-size:12px;color:#999;margin-left:10px;cursor:help" lay-tips="Headscale v{{ version }}"><i class="layui-icon layui-icon-about"></i></span>
            </div>
            <div class="layui-card-body" pad15>

              <div class="layui-form-item">
                <label class="layui-form-label">apiKey</label>
                <div class="layui-input-inline" style="width:395px">
                  <input type="password" name="apiKey" lay-verify="required" autocomplete="off" value="{{ apikey }}" class="layui-input" lay-affix="eye" data-key="BEARER_TOKEN">
                </div>
                <div class="layui-form-mid" style="padding: 0!important;">
                  <button type="button" class="layui-btn layui-btn-primary" lay-on="get_apikey">自动生成</button>
                </div>
                <div class="layui-form-mid layui-word-aux">apikey是与headscale通信的凭证</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">server url</label>
                <div class="layui-input-inline" style="width:500px">
                  <input type="text" name="serverUrl" lay-verify="required" value="{{ server_url }}" class="layui-input autosave" data-key="SERVER_URL">
                </div>
                <div class="layui-form-mid layui-word-aux">headscale对外提供服务的URL</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">新用户默认天数</label>
                <div class="layui-input-inline" style="width:300px">
                  <input type="text" name="defaultRegDays" lay-verify="required" value="{{ default_reg_days }}" class="layui-input autosave" data-key="DEFAULT_REG_DAYS">
                </div>
                <div class="layui-form-mid layui-word-aux">新用户注册默认到期天数,0代表默认禁用</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">默认节点限制</label>
                <div class="layui-input-inline" style="width:300px">
                  <input type="text" name="defaultNodeCount" lay-verify="required" value="{{ default_node_count }}" class="layui-input autosave" data-key="DEFAULT_NODE_COUNT">
                </div>
                <div class="layui-form-mid layui-word-aux">新用户注册默认节点数量限制</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">对外注册</label>
                <div class="layui-input-inline" style="width:80px">
                  <input type="checkbox" name="openUserReg" lay-skin="switch" lay-text="开启|关闭" title="开启|关闭" data-key="OPEN_USER_REG"
                     {{ open_user_reg }}>
                </div>
                <div class="layui-form-mid layui-word-aux">是否允许新用户注册</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">用户模式</label>
                <div class="layui-input-inline" style="width:80px">
                  <input type="checkbox" name="userMode" lay-skin="switch" lay-text="用户|管理员" title="用户|管理员" lay-filter="userModeSet"
                     {{ user_mode_checked }}>
                </div>
                <div class="layui-form-mid layui-word-aux">管理员以用户视角查看数据（只看自己的节点/路由等）</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">网卡名</label>
                <div class="layui-input-inline" style="width:300px">
                  <select name="serverNet" class="autosave" data-key="SERVER_NET">
                    <option value=""></option>
                    {{ server_net|safe }}
                  </select>
                </div>
                <div class="layui-form-mid layui-word-aux">流量统计使用</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">IP查询Key</label>
                <div class="layui-input-inline" style="width:350px">
                  <input type="password" name="tianapiKey" value="{{ tianapi_key }}" placeholder="留空不启用，使用免费接口" class="layui-input autosave" lay-affix="eye" data-key="TIANAPI_KEY">
                </div>
                <div class="layui-form-mid layui-word-aux">天聚数行IP查询API Key，留空则不启用</div>
              </div>

              <hr style="margin:20px 0;border-color:#e6e6e6">
              <div style="color:#999;font-size:13px;margin-bottom:15px">邮件设置</div>

              <div class="layui-form-item">
                <label class="layui-form-label">邮箱验证注册</label>
                <div class="layui-input-inline" style="width:80px">
                  <input type="checkbox" name="emailVerifyReg" lay-skin="switch" lay-text="开启|关闭" title="开启|关闭" data-key="EMAIL_VERIFY_REG"
                     {{ email_verify_reg }}>
                </div>
                <div class="layui-form-mid layui-word-aux">开启后新用户需验证邮箱才能激活</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">SMTP服务器</label>
                <div class="layui-input-inline" style="width:250px">
                  <input type="text" name="smtpHost" value="{{ smtp_host }}" placeholder="smtp.qq.com" class="layui-input autosave" data-key="SMTP_HOST">
                </div>
                <div class="layui-form-mid layui-word-aux">SMTP服务器地址</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">SMTP端口</label>
                <div class="layui-input-inline" style="width:100px">
                  <input type="text" name="smtpPort" value="{{ smtp_port }}" placeholder="465" class="layui-input autosave" data-key="SMTP_PORT">
                </div>
                <div class="layui-form-mid layui-word-aux">465(SSL) / 587(TLS)</div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">发件邮箱</label>
                <div class="layui-input-inline" style="width:300px">
                  <input type="text" name="smtpFrom" value="{{ smtp_from }}" placeholder="xxx@qq.com" class="layui-input autosave" data-key="SMTP_FROM">
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">登录用户</label>
                <div class="layui-input-inline" style="width:300px">
                  <input type="text" name="smtpUser" value="{{ smtp_user }}" placeholder="xxx@qq.com" class="layui-input autosave" data-key="SMTP_USER">
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">授权码</label>
                <div class="layui-input-inline" style="width:300px">
                  <input type="password" name="smtpPassword" value="{{ smtp_password }}" placeholder="QQ邮箱SMTP授权码" class="layui-input autosave" lay-affix="eye" data-key="SMTP_PASSWORD">
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">发件昵称</label>
                <div class="layui-input-inline" style="width:300px">
                  <input type="text" name="smtpFromName" value="{{ smtp_from_name }}" placeholder="显示在邮件中的发件人名称" class="layui-input autosave" data-key="SMTP_FROM_NAME">
                </div>
              </div>

              <div class="layui-form-item">
                <label class="layui-form-label">SSL加密</label>
                <div class="layui-input-inline" style="width:80px">
                  <input type="checkbox" name="smtpSsl" lay-skin="switch" lay-text="SSL|TLS" title="SSL|TLS" data-key="SMTP_SSL"
                     {{ smtp_ssl }}>
                </div>
                <div class="layui-form-mid layui-word-aux">开启用SSL(465)，关闭用TLS(587)</div>
              </div>

            </div>
          </div>

        </div>

      </div>

      <div class="layui-col-md4">
        <div class="layui-card layui-form" lay-filter="component-form-element">
          <div class="layui-card-header">headscale 进程管理</div>
          <div class="layui-card-body layui-row layui-col-space10">
            <div class="layui-col-md12">
              <input type="checkbox" name="zzz" lay-skin="switch" lay-text="开启|关闭" title="开启|关闭" lay-filter="switch_up" {{ headscale_status }}>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/layui/layui.js"></script>
  <script src="/static/csrf.js"></script>

  <script>
  layui.use(function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;
    var util = layui.util;

    // 记录初始值，变化才保存
    var _init = {};
    // 文本输入
    $('.autosave').each(function(){ _init[$(this).data('key')] = $(this).val(); });
    // 下拉选择
    $('select.autosave').each(function(){ _init[$(this).data('key')] = $(this).val(); });
    // 开关（form 渲染后）
    setTimeout(function(){
      $('input[lay-skin="switch"][data-key]').each(function(){
        var key = $(this).data('key');
        _init[key] = this.checked ? 'on' : 'off';
      });
    }, 100);

    // 自动保存开关
    form.on('switch', function(data){
      var key = $(data.elem).data('key');
      if (!key) return;
      var val = data.elem.checked ? 'on' : 'off';
      if (_init[key] === val) return;
      saveField(key, val, function(){ _init[key] = val; }, function(){
        data.elem.checked = _init[key] === 'on';
        form.render('checkbox');
      });
    });

    // 自动保存文本输入（失焦时）
    $('.autosave').on('blur', function(){
      var key = $(this).data('key');
      var val = $(this).val();
      if (!key) return;
      if (_init[key] === val) return;
      saveField(key, val, function(){ _init[key] = val; }, function(){ $(this).val(_init[key]); });
    });

    // 自动保存下拉选择
    $('select.autosave').on('change', function(){
      var key = $(this).data('key');
      var val = $(this).val();
      if (!key) return;
      if (_init[key] === val) return;
      var that = this;
      saveField(key, val, function(){ _init[key] = val; }, function(){ $(that).val(_init[key]); form.render('select'); });
    });

    function saveField(key, val, onSuccess, onError){
      var data = {};
      data[key] = val;
      $.ajax({
        url:'/api/set/upset',
        type:'post',
        data: data,
        dataType:'json',
        success:function(res){
          if (res.code == '0') {
            layer.msg('修改成功', {icon:1, time:800});
            if (onSuccess) onSuccess();
          } else {
            layer.msg(res.msg, {icon:7});
            if (onError) onError();
          }
        },
        error:function(){
          layer.msg('保存失败', {icon:7});
          if (onError) onError();
        }
      });
    }

    // 用户模式开关
    form.on('switch(userModeSet)', function(data){
      var mode = data.elem.checked ? 'user' : 'admin';
      $.ajax({
        url:'/api/set/user_mode',
        type:'post',
        data: { mode: mode },
        dataType:'json',
        success:function(res){
          layer.msg(res.msg, {icon: res.code == '0' ? 6 : 7});
          if (res.code == '0'){
            try { parent.location.reload(); } catch(e){}
          } else {
            data.elem.checked = !data.elem.checked;
            form.render('checkbox');
          }
        },
        error:function(){
          data.elem.checked = !data.elem.checked;
          form.render('checkbox');
          layer.msg('保存失败', {icon:7});
        }
      });
    });

    // headscale 进程开关
    form.on('switch(switch_up)', function(data){
      $.ajax({
        url:'/api/set/switch_headscale',
        type:'post',
        data: {Switch:this.checked},
        dataType:'json',
        success:function(res){
          layer.msg(res.msg, {icon: res.code == '0' ? 6 : 7});
        }
      });
    });

    // 自动生成 apikey
    util.on('lay-on', {
      'get_apikey': function(){
         $.ajax({
            url:'/api/set/get_apikey',
            type:'post',
            success:function(res){
              if(res.code == 0){
                layer.msg(res.msg, {icon:6});
                $('input[name="apiKey"]').val(res.data);
                // apikey 无 data-key，手动更新初始值
              }else{
                layer.msg(res.msg, {icon:7});
              }
            }
         });
      },
    });

  });
  </script>

</body>
</html>
