{% extends "base.html" %}
{% block title %}路由中心{% endblock %}

{% block body %}
<div class="p-6" x-data="routePage">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 flex items-center justify-between">
      <span class="font-semibold">路由中心</span>
      <div class="flex gap-2">
        <button @click="showAddModal = true" class="px-3 py-1.5 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600">路由通告</button>
        <button @click="refresh" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">刷新</button>
      </div>
    </div>
    <div class="p-4">
      <div id="route-table"></div>
    </div>
  </div>

  <!-- 路由通告弹窗 -->
  <div x-show="showAddModal" class="modal-overlay" @click.self="showAddModal = false" x-transition.opacity>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-sm p-6" x-transition.scale>
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold">路由通告</h3>
        <button @click="showAddModal = false" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <div class="space-y-4">
        {% if current_user.role == 'manager' %}
        <div>
          <label class="block text-sm text-gray-500 mb-1">用户选择</label>
          <select x-model="addForm.userId" @change="loadNodes" class="w-full px-3 py-2 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm">
            <option value="">请选择用户</option>
            <template x-for="u in userList" :key="u.id">
              <option :value="u.id" x-text="u.userName"></option>
            </template>
          </select>
        </div>
        {% endif %}
        <div>
          <label class="block text-sm text-gray-500 mb-1">节点选择</label>
          <select x-model="addForm.nodeId" @change="loadRoutes" class="w-full px-3 py-2 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm">
            <option value="">请选择节点</option>
            <template x-for="n in nodeList" :key="n.id">
              <option :value="n.id" x-text="n.name + ' (' + n.ip + ')'"></option>
            </template>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-500 mb-1">路由选择</label>
          <select x-model="addForm.route" class="w-full px-3 py-2 rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm">
            <option value="">请选择路由</option>
            <template x-for="r in routeList" :key="r">
              <option :value="r" x-text="r"></option>
            </template>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button @click="showAddModal = false" class="px-4 py-2 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">取消</button>
        <button @click="doAdd" :disabled="adding" class="px-4 py-2 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600 disabled:opacity-50" x-text="adding ? '提交中...' : '提交'"></button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('routePage', () => ({
    grid: null, showAddModal: false, adding: false,
    userList: [], nodeList: [], routeList: [],
    currentUser: { id: '{{ current_user.id }}', username: '{{ current_user.name }}' },
    addForm: { userId: '', nodeId: '', route: '' },

    init() {
      this.buildTable();
      {% if current_user.role != 'manager' %}
      this.loadNodes();
      {% endif %}
    },

    buildTable() {
      var self = this;
      var cols = [
        { name: 'ID', id: 'id', sort: true, width: '80px' },
        {% if current_user.role == 'manager' %}
        { name: '用户名', id: 'name', width: '150px' },
        {% endif %}
        { name: '节点', id: 'NodeName', width: '200px' },
        { name: '路由', id: 'route', width: '200px' },
        { name: '创建时间', id: 'createTime', sort: true, width: '160px' },
        { name: '操作', id: 'actions', width: '120px', sort: false, formatter: function(_, row) {
          var cells = row.cells; var idIdx = 0; var id = cells[idIdx].data; var enIdx = cells.length - 2; var enabled = cells[enIdx].data === '1';
          return gridjs.html('<input type="checkbox" ' + (enabled ? 'checked' : '') + ' onchange="document.dispatchEvent(new CustomEvent(\'route:toggle\',{detail:{id:' + id + ', val: this.checked}}))" class="w-4 h-4 rounded border-gray-300 text-primary-500 mr-2"><button class="text-red-500 hover:text-red-600 text-sm" onclick="document.dispatchEvent(new CustomEvent(\'route:del\',{detail:{id:' + id + '}}))">删除</button>');
        }}
      ];

      this.grid = new gridjs.Grid({
        columns: cols,
        server: {
          url: '/api/route/getRoute',
          then: function(data) {
            var list = data.data || [];
            return list.map(function(r) {
              return [r.id, {% if current_user.role == 'manager' %}r.name, {% endif %}r.NodeName, r.route, r.createTime, r.enable, null];
            });
          }
        },
        search: true,
        sort: { multiColumn: false },
        pagination: { limit: 15 },
        language: { search: { placeholder: '搜索...' }, pagination: { showing: '显示', to: '到', of: '共', results: '' } },
        style: { table: { 'white-space': 'nowrap' } },
        className: { table: 'text-sm' }
      }).render(document.getElementById('route-table'));

      document.addEventListener('route:del', function(e) {
        openConfirm('确认删除该路由吗？', function() {
          apiPost('/api/node/delete_route', { routeId: e.detail.id }).then(function(res) {
            showToast(res.msg, res.code === '0' ? 'success' : 'error');
            self.refresh();
          });
        });
      });

      document.addEventListener('route:toggle', function(e) {
        apiPost('/api/node/route_open', { id: e.detail.id, enable: e.detail.val }).then(function(res) {
          showToast(res.msg, res.code === '0' ? 'success' : 'error');
        });
      });
    },

    async loadUsers() {
      try {
        var res = await fetch('/api/user/getUsers').then(r => r.json());
        this.userList = res.data || [];
      } catch(e) {}
    },

    async loadNodes() {
      var userId = this.addForm.userId || this.currentUser.id;
      if (!userId) return;
      try {
        var res = await fetch('/api/node/getNodes?search_name=' + (this.addForm.userId ? this.userList.find(u => u.id == userId)?.userName || '' : this.currentUser.username)).then(r => r.json());
        this.nodeList = res.data || [];
      } catch(e) {}
    },

    async loadRoutes() {
      if (!this.addForm.nodeId) { this.routeList = []; return; }
      try {
        var fd = new URLSearchParams(); fd.append('NodeId', this.addForm.nodeId);
        var res = await apiPost('/api/node/node_route_info', fd);
        if (res.code === '0' && res.data && res.data.length > 0) {
          this.routeList = res.data[0].availableRoutes || [];
        } else { this.routeList = []; }
      } catch(e) {}
    },

    async doAdd() {
      if (!this.addForm.nodeId || !this.addForm.route) { showToast('请完整填写', 'warning'); return; }
      this.adding = true;
      try {
        var fd = new URLSearchParams();
        fd.append('nodeId', this.addForm.nodeId);
        fd.append('routes', this.addForm.route);
        {% if current_user.role != 'manager' %}
        fd.append('userId', this.currentUser.id);
        {% else %}
        fd.append('userId', this.addForm.userId);
        {% endif %}
        var res = await apiPost('/api/node/approve_routes', fd);
        showToast(res.msg || '操作完成', res.code === '0' ? 'success' : 'error');
        if (res.code === '0') { this.showAddModal = false; this.refresh(); }
      } catch(e) { showToast('操作失败', 'error'); }
      this.adding = false;
    },

    refresh() { if (this.grid) this.grid.forceRender(); }
  }));
});
</script>
{% endblock %}
