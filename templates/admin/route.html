<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>路由管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/static/layui/css/layui.css" rel="stylesheet">
  <link href="/static/adminui/dist/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="layui-fluid">
  <div class="layui-row layui-col-space15">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-header">路由管理</div>
        <div class="layui-card-body">
          <table class="layui-hide" id="route-table" lay-filter="route-table"></table>

          <script type="text/html" id="toolbarDemo">
            <div class="layui-btn-container">
              <button class="layui-btn layui-btn-sm" lay-event="refresh">刷新</button>
            </div>
          </script>

          {% raw %}
          <script type="text/html" id="switchTpl">
            <input type="checkbox" name="enabled" lay-skin="switch" lay-text="ON|OFF"
             lay-filter="route-switch" value="{{ d.enabled }}"
             data-nodeid="{{ d.nodeId }}" data-route="{{ d.route }}"
             {{ d.enabled ? 'checked' : '' }}>
          </script>
          {% endraw %}
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/layui/layui.js"></script>
<script src="/static/csrf.js"></script>
<script>
layui.config({
  base: '/static/'
}).use(['table', 'form'], function(){
  var table = layui.table, form = layui.form, $ = layui.$;

  table.render({
    elem: '#route-table'
    ,url: '/api/route/getAllRoutes'
    ,toolbar: '#toolbarDemo'
    ,height: 'full-100'
    ,page: true
    ,limits: [20, 50, 100]
    ,limit: 50
    ,cols: [[
      {field:'userName', title:'用户', width:150}
      ,{field:'nodeName', title:'节点', width:200}
      ,{field:'route', title:'路由前缀', width:220}
      ,{field:'enabled', title:'状态', width:100, templet: '#switchTpl', unresize: true}
    ]]
  });

  // 工具栏事件
  table.on('toolbar(route-table)', function(obj){
    if(obj.event === 'refresh'){
      table.reload('route-table');
    }
  });

  // 开关切换事件
  form.on('switch(route-switch)', function(obj){
    var enabled = obj.elem.checked;
    var nodeId = this.getAttribute('data-nodeid');
    var route = this.getAttribute('data-route');

    $.ajax({
      url: '/api/route/toggleRoute',
      type: 'POST',
      data: {
        nodeId: nodeId,
        route: route,
        enable: enabled ? '1' : '0'
      },
      headers: {'X-CSRFToken': csrfToken},
      success: function(res) {
        if (res.code === '0') {
          layer.msg(res.msg, {icon: 1});
        } else {
          layer.msg(res.msg || '操作失败', {icon: 2});
          table.reload('route-table');
        }
      },
      error: function() {
        layer.msg('网络错误', {icon: 2});
        table.reload('route-table');
      }
    });
  });
});
</script>
</body>
</html>
