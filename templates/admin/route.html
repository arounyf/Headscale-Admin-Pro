<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>路由管理</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/static/layui/css/layui.css" rel="stylesheet">
  <link href="/static/adminui/dist/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="layui-fluid">
  <div class="layui-row layui-col-space15">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-header">路由管理</div>
        <div class="layui-card-body">

          {% if current_user.role == 'manager' and session.get('user_mode', 'admin') != 'user' %}
          <div class="layui-form" lay-filter="searchForm" style="margin-bottom: 5px;">
            <div class="layui-input-inline" style="width: 300px;">
              <input type="text" name="search_name" placeholder="请输入用户名搜索" class="layui-input" lay-affix="clear">
            </div>
            <button class="layui-btn layui-btn-sm" lay-submit lay-filter="demo-table-search">
              <i class="layui-icon layui-icon-search"></i> 搜索
            </button>
          </div>
          {% endif %}

          <table class="layui-table" id="route-table" lay-filter="route-table"></table>

          <script type="text/html" id="toolbarDemo">
            <div class="layui-btn-container">
              <button class="layui-btn layui-btn-sm" lay-event="refresh">刷新</button>
            </div>
          </script>

          {% raw %}
          <script type="text/html" id="switchTpl">
            <input type="checkbox" name="开关" lay-skin="switch" lay-text="是|否"
             lay-filter="route-switch" value="{{ d.enabled }}"
             data-json="{{ encodeURIComponent(JSON.stringify(d)) }}" {{ d.enabled ? 'checked' : '' }}>
          </script>
          {% endraw %}
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/layui/layui.js"></script>
<script src="/static/csrf.js"></script>
<script>
layui.config({
  base: '/static/'
}).use(['index', 'table', 'form'], function(){
  var table = layui.table, form = layui.form, $ = layui.$;

  var tableIns = table.render({
    elem: '#route-table'
    ,url: '/api/route/getAllRoutes'
    ,toolbar: '#toolbarDemo'
    ,defaultToolbar: ['filter', 'exports', 'print', {
      title: '帮助', layEvent: 'LAYTABLE_TIPS', icon: 'layui-icon-tips'
    }]
    ,height: {% if current_user.role == 'manager' and session.get('user_mode', 'admin') != 'user' %}'full-150'{% else %}'full-100'{% endif %}
    ,cellMinWidth: 80
    ,totalRow: true
    ,page: true
    ,limits: [30, 50, 100]
    ,limit: 50
    ,where: {}
    ,cols: [[
      {field:'id', fixed: 'left', width:80, title: 'ID', sort: true, totalRowText: '合计：'}
      {% if current_user.role == 'manager' and session.get('user_mode', 'admin') != 'user' %}
      ,{field:'userName', width:150, title: '用户名', sort: true, totalRow: '  {% raw %}{{= d.TOTAL_ROW.count   }}{% endraw %} 😊'}
      {% endif %}
      ,{field:'nodeName', width:200, title: '节点'}
      ,{field:'route', width:220, title: '路由前缀'}
      ,{field:'enabled', width:100, title: '状态', templet: '#switchTpl', unresize: true}
    ]]
    ,error: function(res, msg){
      console.log(res, msg)
    }
  });

  // 工具栏事件
  table.on('toolbar(route-table)', function(obj){
    if(obj.event === 'refresh'){
      table.reload('route-table');
    }
  });

  // 管理员搜索
  {% if current_user.role == 'manager' and session.get('user_mode', 'admin') != 'user' %}
  form.on('submit(demo-table-search)', function(data){
    tableIns.reload({
      where: { search_name: data.field.search_name },
      page: { curr: 1 }
    });
    return false;
  });
  {% endif %}

  // 路由开关切换
  form.on('switch(route-switch)', function(obj){
    var json = JSON.parse(decodeURIComponent($(this).data('json')));
    json = table.clearCacheKey(json);
    var enabled = obj.elem.checked;

    $.ajax({
      url: '/api/route/toggleRoute',
      type: 'POST',
      data: { nodeId: json.nodeId, route: json.route, enable: enabled ? '1' : '0' },
      success: function(res) {
        if (res.code === '0') {
          layer.msg(res.msg, {icon: 1});
        } else {
          layer.msg(res.msg || '操作失败', {icon: 2});
          table.reload('route-table');
        }
      },
      error: function() {
        layer.msg('网络错误', {icon: 2});
        table.reload('route-table');
      }
    });
  });
});
</script>
</body>
</html>
