<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>节点中心</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/static/layui/css/layui.css" rel="stylesheet">
  <link href="/static/adminui/dist/css/admin.css" rel="stylesheet">
</head>
<body>

  <div class="layui-fluid">
    <div class="layui-row layui-col-space15">
      <div class="layui-col-md12">
        <div class="layui-card">
          <div class="layui-card-header">节点中心</div>
          <div class="layui-card-body">

            {% if current_user.role == 'manager' and session.get('user_mode', 'admin') != 'user' %}
            <div class="layui-form" lay-filter="searchForm" style="margin-bottom:5px;">
              <div class="layui-input-inline" style="width:260px;">
                <input type="text" name="search_name" placeholder="请输入用户名搜索" class="layui-input" lay-affix="clear">
              </div>
              <button class="layui-btn layui-btn-sm" lay-submit lay-filter="demo-table-search">
                <i class="layui-icon layui-icon-search"></i> 搜索
              </button>
            </div>
            {% endif %}

            <!-- 表格：保留原有的所有配置 -->
            <table class="layui-table" id="test-table-index" lay-filter="test-table-index"></table>

            <!-- 工具栏模板 -->
            <script type="text/html" id="toolbarDemo">
              <div class="layui-btn-container">
                <button id="switchButton" class="layui-btn layui-btn-sm" lay-event=""></button>
                <button class="layui-btn layui-btn-sm" lay-event="reload">刷新</button>
                <button class="layui-btn layui-btn-sm layui-btn-primary" lay-event="multi-row">多行</button>
                <button class="layui-btn layui-btn-sm layui-btn-primary" lay-event="default-row">单行</button>
                <span style="color:#E6A23C;font-size:13px;margin-left:8px;display:inline-flex;align-items:center;height:30px;"><i class="layui-icon layui-icon-about" style="margin-right:2px;"></i> 提示：节点客户端版本低于 <b>v1.80.0</b> 的节点请尽快升级</span>
              </div>
            </script>

            <!-- 时间模板 -->
            {% raw %}
            <script type="text/html" id="TPL-lastTime">  
                {{#  
                  var util = layui.util;
                  var lastTime = function(){
                    return util.timeAgo(d.lastTime);
                  }; 
                }}
                {{= lastTime() }}
            </script>               
            {% endraw %}

            <!-- 操作列模板 -->
            <script type="text/html" id="barDemo">
              <a class="layui-btn layui-btn-info layui-btn-xs" lay-event="detail">查看</a>
              <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
            </script>  
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/static/layui/layui.js"></script>
  <script src="/static/csrf.js"></script>

  <script>
  layui.config({
    base: '/static/'
  }).use(['index', 'table', 'dropdown', 'form'], function(){
    var table = layui.table;
    var $ = layui.$;
    var util = layui.util;
    var form = layui.form;

    // 节点添加结果提示（保留原有逻辑）
    var ip_address = '{{ ip_address }}';
    if (ip_address == "error"){
        layer.alert('{{ error_info }}', {
            icon: 7, shadeClose: true, title: '节点添加失败'
        }, function(){
            window.location.href = '/admin/node';
        });
    } else if(ip_address && ip_address != "error"){
        layer.alert('ip地址: '+ ip_address, {
            icon: 1, shadeClose: true, title: '节点添加成功'
        }, function(){
            window.location.href = '/admin/node';
        });
    }

    // 表格渲染（保留原有所有配置，仅调整height适配搜索框）
    var tableIns = table.render({
      elem: '#test-table-index'
      ,url: '/api/node/getNodes'
      ,toolbar: '#toolbarDemo'
      ,defaultToolbar: ['filter', 'exports', 'print', {
        title: '帮助', layEvent: 'LAYTABLE_TIPS', icon: 'layui-icon-tips'
      }]
      ,height: {% if current_user.role == 'user' or session.get('user_mode', 'admin') == 'user' %}'full-100'{% else %}'full-150'{% endif %}
      ,cellMinWidth: 80
      ,totalRow: true
      ,page: false
      ,where: {} // 存储搜索条件
      ,cols: [[
            {field:'id', fixed: 'left', width:80, title: 'ID', sort: true, totalRowText: '合计：'}
            {% if current_user.role == 'manager' and session.get('user_mode', 'admin') != 'user' %}
                ,{field:'userName', width:180, title: '用户名', sort: true,totalRow: '  {% raw %}{{= d.TOTAL_ROW.count   }}{% endraw %} 😊'}
            {% endif %}
            ,{field:'name', width:160, title: '节点名', edit: 'text'
                {% if current_user.role == 'user' or session.get('user_mode', 'admin') == 'user' %}
                    ,totalRow: ' {% raw %}{{= d.TOTAL_ROW.count   }}{% endraw %} 😊'
                {% endif %}
            }
            ,{field:'ip', width:160, title:'IP地址', templet: function(d){ return d.ip.split(', ').join('<br>'); }}
            ,{field:'online', width:220, title:'状态', sort:true, templet: function(d){
                var on = d.online;
                var s = on ? '<span class="layui-badge layui-bg-green">在线</span> ' : '<span class="layui-badge layui-bg-gray">离线</span> ';
                var cls = on ? ' layui-bg-green' : ' layui-bg-gray';
                if (d.isExitNode) s += '<span class="layui-badge'+cls+'">Exit</span> ';
                if (d.hasSubnets) s += '<span class="layui-badge'+cls+'">Subnet</span> ';
                var ver = (d.Client||'').split('-')[0];
                if (ver) {
                    var parts = ver.split('.');
                    var low = parts.length>=2 && parseInt(parts[1])<80;
                    var vsty = low ? 'background:#F56C6C!important;color:#fff!important;' : '';
                    s += '<span class="layui-badge layui-bg-gray" style="'+vsty+'">v'+ver+'</span>';
                }
                return s;
            }}
            ,{fixed:'right', title:'操作', width:120, toolbar: '#barDemo'}
        ]]
      ,error: function(res, msg){
        console.log(res, msg)
      }
    });

    // 保留按钮状态逻辑
    function keepButtonStatus(){
        if (window.top !== window) {
            $('#switchButton').attr('lay-event', 'addNode').text('添加节点');
        }else{
            $('#switchButton').attr('lay-event', 'goHome').text('返回主页');
        }
    }
    keepButtonStatus();

    // 搜索表单提交事件
    form.on('submit(demo-table-search)', function(data){
      var field = data.field;
      // 重载表格，传递搜索条件
      table.reload('test-table-index', {
        where: field, // 搜索条件：{username: "输入的用户名"}
        page: false // 重置页码
      });
      keepButtonStatus();

      return false; // 阻止表单默认提交
    });

    // 单元格编辑事件（保留原有逻辑）
    table.on('edit(test-table-index)', function(obj){
      var value = obj.value, data = obj.data, field = obj.field;
      if (field == "name"){
        $.ajax({
          url:'/api/node/rename',
          type: 'post',
          dataType: 'json',
          data: {nodeId: obj.data.id, nodeName: obj.value},
          success:function(res){
            if(res.code == 0){
              layer.msg(res.msg, {icon: 6});
              obj.update({name: value});
            }else{
              layer.msg(res.msg, {icon: 7});
            }
          }
        });
      }
    });

    // 工具栏事件（保留原有逻辑）
    table.on('toolbar(test-table-index)', function(obj){
      var checkStatus = table.checkStatus(obj.config.id);
      switch(obj.event){
        case 'goHome':
          window.location.href = '/admin';
          break;
        case 'addNode':
          layer.prompt({title: '请输入节点注册密钥 (nodekey)'}, function(value, index){
            if(value === '') return;
            $.ajax({
              url:'/api/node/register',
              type: 'post',
              dataType: 'json',
              data: {nodekey: value},
              success:function(res){
                if(res.code == 0){
                  layer.msg(res.msg, {icon: 6});
                  table.reload('test-table-index', true);
                }else{
                  layer.msg(res.msg, {icon: 7});
                }
              }
            });
            layer.close(index);
          });
          break;
        case 'reload':
          // 刷新时保留搜索条件
          table.reload('test-table-index', {
            where: tableIns.config.where
          });
          layer.msg('已刷新', {icon: 1});
          break;
        case 'multi-row':
          table.reload('test-table-index', {lineStyle: 'height: 95px;'});
          layer.msg('已设为多行显示');
          break;
        case 'default-row':
          table.reload('test-table-index', {lineStyle: null});
          layer.msg('已设为单行显示');
          break;
        case 'LAYTABLE_TIPS':
          layer.alert('Table for layui-v'+ layui.v);
          break;
      }
      keepButtonStatus();
    });

    // 单元格工具事件（保留原有逻辑）
    table.on('tool(test-table-index)', function(obj){
      var data = obj.data;
      if(obj.event === 'del'){
        layer.confirm('真的删除该节点吗？', function(index){
          $.ajax({
            url:'/api/node/delete',
            type: 'post',
            dataType: 'json',
            data: {NodeId: obj.data.id},
            success:function(res){
              if(res.code == 0){
                layer.msg(res.msg, {icon: 6});
                obj.del();
              }else{
                layer.msg(res.msg, {icon: 7});
              }
            }
          });
          layer.close(index);
        });
      }else if(obj.event === 'detail'){
        layer.open({
          title: '节点详情',
          type: 1,
          area: ['550px','500px'],
          content: '<div id="node-detail-content" style="padding:20px 25px;"></div>'
        });
        $.ajax({
          url:'/api/node/node_info',
          type: 'post',
          dataType: 'json',
          data: {NodeId: obj.data.id},
          success:function(res){
            console.log(res);
            if (res.code === "0" && res.data && res.data.length > 0) {
              var d = res.data[0];
              var rows = [
                ['节点名', d.name],
                ['主机名', d.hostname],
                ['用户名', d.userName],
                ['邮箱', d.userEmail],
                ['IPv4', d.ipv4],
                ['IPv6', d.ipv6],
                ['客户端版本', d.Client],
                ['操作系统', (d.OS + ' ' + (d.OSVersion||'')).trim()],
                ['发行版', (d.Distro + ' ' + (d.DistroVersion||'')).trim()],
                ['架构', d.Machine],
                ['设备型号', d.DeviceModel],
                ['Go 版本', d.GoVersion],
                ['发布路由', d.Routes],
                ['创建时间', d.createdAt ? new Date(d.createdAt).toLocaleString() : ''],
                ['最后在线', d.lastSeen ? new Date(d.lastSeen).toLocaleString() : ''],
              ];
              var html = '';
              rows.forEach(function(r){
                html += '<div style="display:flex;padding:4px 0;border-bottom:1px solid #f0f0f0;"><span style="color:#909399;width:90px;flex-shrink:0;">' + r[0] + '</span><span>' + (r[1] || '-') + '</span></div>';
              });
              $('#node-detail-content').html(html || '暂无数据');
            } else {
              layer.msg(res.msg, {icon: 7});
            }
          }
        });
      }
    });
  });
  </script>
</body>
</html>
