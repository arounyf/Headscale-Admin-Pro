{% extends "base.html" %}
{% block title %}节点中心{% endblock %}

{% block body %}
<div class="p-6" x-data="nodePage">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 flex items-center justify-between flex-wrap gap-2">
      <span class="font-semibold">节点中心</span>
      <div class="flex gap-2 flex-wrap">
        {% if current_user.role == 'manager' %}
        <form @submit.prevent="searchSubmit" class="flex gap-2">
          <input type="text" x-model="searchName" placeholder="搜索用户名" class="w-48 px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 bg-gray-50 dark:bg-gray-700 outline-none focus:ring-2 focus:ring-primary-500">
          <button type="submit" class="px-3 py-1.5 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600">搜索</button>
        </form>
        {% endif %}
        <button @click="addNode" class="px-3 py-1.5 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600" id="switchButton">添加节点</button>
        <button @click="refresh" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">刷新</button>
        <button @click="toggleMultiRow" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">
          <span x-text="multiRow ? '单行' : '多行'"></span>
        </button>
      </div>
    </div>
    <div class="p-4">
      <div id="node-table"></div>
    </div>
  </div>

  <!-- 节点详情弹窗 -->
  <div x-show="showDetail" class="modal-overlay" @click.self="showDetail = false" x-transition.opacity>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-lg p-6" x-transition.scale>
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold">节点信息</h3>
        <button @click="showDetail = false" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <div x-html="detailContent"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('nodePage', () => ({
    grid: null, searchName: '', multiRow: false,
    showDetail: false, detailContent: '',

    init() {
      // 检查是否从注册页面转来
      {% if ip_address %}
      var ip = '{{ ip_address }}';
      var err = '{{ error_info }}';
      if (ip === 'error') {
        setTimeout(function() {
          openModal('节点添加失败', '<p class="text-red-500">' + (err || '添加失败') + '</p>', function() { window.location.href = '/admin/node'; }, { confirmText: '确定', cancelText: '取消' });
        }, 300);
      } else if (ip && ip !== 'error') {
        setTimeout(function() {
          openModal('节点添加成功', '<p>IP地址: <strong>' + ip + '</strong></p>', function() { window.location.href = '/admin/node'; }, { confirmText: '确定', cancelText: '取消' });
        }, 300);
      }
      {% endif %}

      this.buildTable();
      this.updateButtonLabel();
    },

    buildTable() {
      var self = this;

      var cols = [
        { name: 'ID', id: 'id', sort: true, width: '80px' },
        {% if current_user.role == 'manager' %}
        { name: '用户名', id: 'userName', sort: true, width: '150px' },
        {% endif %}
        { name: '节点名', id: 'name', width: '180px' },
        { name: 'IP地址', id: 'ip', width: '160px', formatter: function(cell) { return gridjs.html(String(cell || '').split(', ').join('<br>')); } },
        { name: '状态', id: 'online', width: '80px', sort: true, formatter: function(cell) { return gridjs.html(cell ? '<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400">在线</span>' : '<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400">离线</span>'); } },
        { name: '创建时间', id: 'createTime', width: '160px', sort: true, formatter: function(cell) { return gridjs.html(timeAgo(cell)); } },
        { name: '操作', id: 'actions', width: '120px', sort: false, formatter: function(_, row) {
          var cells = row.cells;
          var idIdx = 0;
          var data = { id: cells[idIdx].data };
          return gridjs.html('<button class="text-primary-500 hover:text-primary-600 text-sm mr-2" onclick="document.dispatchEvent(new CustomEvent(\'node:detail\',{detail:' + JSON.stringify(data) + '}))">查看</button><button class="text-red-500 hover:text-red-600 text-sm" onclick="document.dispatchEvent(new CustomEvent(\'node:del\',{detail:' + JSON.stringify(data) + '}))">删除</button>');
        }}
      ];

      var serverOpts = {
        url: '/api/node/getNodes',
        then: function(data) {
          var list = data.data || [];
          return list.map(function(r) {
            return [r.id, {% if current_user.role == 'manager' %}r.userName, {% endif %}r.name, r.ip, r.online, r.createTime, null];
          });
        }
      };

      if (this.searchName) {
        serverOpts.url = '/api/node/getNodes?search_name=' + encodeURIComponent(this.searchName);
      }

      this.grid = new gridjs.Grid({
        columns: cols,
        server: serverOpts,
        search: false,
        sort: { multiColumn: false },
        pagination: false,
        height: this.multiRow ? undefined : undefined,
        style: { table: { 'font-size': '14px' }, td: this.multiRow ? { 'padding': '12px 8px' } : {} },
        className: { table: 'text-sm' }
      }).render(document.getElementById('node-table'));

      // 事件处理
      document.addEventListener('node:del', function(e) {
        var d = e.detail;
        openConfirm('确认删除该节点吗？', function() {
          apiPost('/api/node/delete', { NodeId: d.id }).then(function(res) {
            if (res.code === '0') { showToast(res.msg, 'success'); self.refresh(); }
            else { showToast(res.msg, 'error'); }
          });
        });
      });

      document.addEventListener('node:detail', function(e) {
        var d = e.detail;
        apiPost('/api/node/node_info', { NodeId: d.id }).then(function(res) {
          if (res.code === '0') {
            var list = res.data || [];
            var info = list.length > 0 ? list[0] : {};
            self.detailContent = '<p><strong>客户端:</strong> ' + escapeHtml(info.Client || '未知') + '</p><p><strong>操作系统:</strong> ' + escapeHtml(info.OS || '未知') + '</p>';
            self.showDetail = true;
          } else { showToast(res.msg, 'error'); }
        });
      });
    },

    updateButtonLabel() {
      try {
        var btn = document.getElementById('switchButton');
        if (btn && window.top !== window) { btn.textContent = '添加节点'; btn.setAttribute('data-action', 'add'); }
        else { btn.textContent = '返回主页'; btn.setAttribute('data-action', 'home'); }
      } catch(e) {}
    },

    addNode() {
      var btn = document.getElementById('switchButton');
      var action = btn ? btn.getAttribute('data-action') : 'add';
      if (action === 'home') {
        window.location.href = '/admin';
        return;
      }
      var nodeKey = prompt('请输入节点ID:');
      if (!nodeKey) return;
      var self = this;
      apiPost('/api/node/register', { nodekey: nodeKey }).then(function(res) {
        if (res.code === '0') { showToast(res.msg, 'success'); self.refresh(); }
        else { showToast(res.msg, 'error'); }
      });
    },

    searchSubmit() {
      this.buildTable();
    },

    toggleMultiRow() {
      this.multiRow = !this.multiRow;
      this.buildTable();
    },

    refresh() {
      if (this.grid) this.grid.forceRender();
    }
  }));
});
</script>
{% endblock %}
