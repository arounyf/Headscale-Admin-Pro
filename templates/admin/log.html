{% extends "base.html" %}
{% block title %}日志中心{% endblock %}

{% block body %}
<div class="p-6" x-data="logPage">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 flex items-center justify-between">
      <span class="font-semibold">日志中心</span>
      <button @click="refresh" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">刷新</button>
    </div>
    <div class="p-4">
      <div id="log-table"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('logPage', () => ({
    grid: null,

    init() {
      this.buildTable();
    },

    buildTable() {
      var cols = [
        { name: 'ID', id: 'id', sort: true, width: '80px' },
        {% if current_user.role == 'manager' %}
        { name: '用户名', id: 'name', width: '150px' },
        {% endif %}
        { name: '内容', id: 'content' },
        { name: '时间', id: 'create_time', width: '200px', sort: true },
      ];

      this.grid = new gridjs.Grid({
        columns: cols,
        server: {
          url: '/api/log/getLogs',
          then: function(data) {
            var list = data.data || [];
            return list.map(function(r) { return [r.id, {% if current_user.role == 'manager' %}r.name, {% endif %}r.content, r.create_time]; });
          }
        },
        search: true,
        sort: true,
        pagination: { limit: 15 },
        language: {
          search: { placeholder: '搜索...' },
          pagination: { showing: '显示', to: '到', of: '共', results: '' }
        },
        style: { table: { 'white-space': 'nowrap' } },
        className: { table: 'text-sm' }
      }).render(document.getElementById('log-table'));
    },

    refresh() {
      if (this.grid) this.grid.forceRender();
    }
  }));
});
</script>
{% endblock %}
