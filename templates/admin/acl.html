<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>访问控制 — ACL 规则</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/static/layui/css/layui.css" rel="stylesheet">
  <link href="/static/adminui/dist/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="layui-fluid">
  <div class="layui-row layui-col-space15">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-header">ACL 策略编辑器
        </div>
        <div class="layui-card-body">

          <blockquote class="layui-elem-quote" style="margin-top:0;border-left:5px solid #E6A23C;background:#FDF6EC;color:#E6A23C;">
            <i class="layui-icon layui-icon-about" style="font-size:15px;"></i>
            从 v5.0 开始使用固定 ACL，所有规则需手动填入编辑器。不再支持按用户拆分管理，请直接编辑完整 JSON。
          </blockquote>

          <div class="layui-form">
            <div class="layui-form-item">
              <div class="layui-input-block">
                <textarea id="acl-editor" class="layui-textarea" style="font-family:monospace;font-size:13px;min-height:420px;"
                 placeholder="在此编辑 ACL JSON..."></textarea>
              </div>
            </div>
            <div class="layui-form-item">
              <button class="layui-btn layui-btn-primary" id="btn-template">模板</button>
              <button class="layui-btn" lay-submit lay-filter="read">刷新</button>
              <button class="layui-btn layui-btn-normal" lay-submit lay-filter="save">保存</button>
              <button class="layui-btn layui-btn-warm" lay-submit lay-filter="reload">重载</button>
              <span id="status-msg" style="margin-left:12px;color:#67C23A;display:none;"></span>
            </div>
            <div class="layui-form-item" style="margin-top:-10px;">
              <div class="layui-input-block">
                <span style="color:#E6A23C;font-size:12px;"><i class="layui-icon layui-icon-tips"></i> 请点击 <b>模板</b> 查看 ACL 模板，手动复制修改后点击 <b>保存</b>。</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/layui/layui.js"></script>
<script src="/static/csrf.js"></script>
<script>
layui.config({ base: '/static/' }).use(['index', 'form', 'layer'], function(){
  var form = layui.form, $ = layui.$, layer = layui.layer;

  var templateACL = '{\n' +
    '    "randomizeClientPort": true,\n' +
    '    "groups": {\n' +
    '        "group:admin": ["admin@"]\n' +
    '    },\n' +
    '    "acls": [\n' +
    '        {\n' +
    '            "action": "accept",\n' +
    '            "src": ["autogroup:member"],\n' +
    '            "dst": ["autogroup:self:*"]\n' +
    '        },\n' +
    '        {\n' +
    '            "action": "accept",\n' +
    '            "src": ["group:admin"],\n' +
    '            "dst": ["autogroup:internet:*"]\n' +
    '        }\n' +
    '    ]\n' +
    '}';

  // 页面加载时读取已有 ACL
  $.post('/api/acl/get_acl', function(res){
    if(res.code === '0' && res.data){
      $('#acl-editor').val(res.data);
    }
  });

  // 弹出模板内容
  $('#btn-template').on('click', function(){
    layer.open({
      type: 1,
      title: 'ACL 模板 — 手动复制',
      area: ['560px', '380px'],
      content: '<div style="padding:15px 20px;">' +
        '<div style="margin-bottom:10px;color:#909399;font-size:12px;"><i class="layui-icon layui-icon-tips"></i> 请复制以下内容到编辑器中，根据实际需求修改：</div>' +
        '<pre style="background:#f6f8fa;border:1px solid #e4e7ed;padding:15px;border-radius:2px;font-size:13px;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto;-webkit-user-select:all;user-select:all;">' +
        templateACL.replace(/</g,'&lt;').replace(/>/g,'&gt;') +
        '</pre></div>',
      btn: ['关闭'],
      yes: function(idx){ layer.close(idx); }
    });
  });

  function showStatus(msg, ok){
    var el = $('#status-msg');
    el.css('color', ok ? '#67C23A' : '#F56C6C').text(msg).show();
    setTimeout(function(){ el.hide(); }, 3000);
  }

  form.on('submit(read)', function(){
    layer.load();
    $.post('/api/acl/get_acl', function(res){
      layer.closeAll('loading');
      if(res.code === '0' && res.data){
        $('#acl-editor').val(res.data);
        showStatus('刷新成功', true);
      } else {
        layer.msg('ACL 文件为空，请点击模板按钮查看参考', {icon: 0, time: 5000});
      }
    });
    return false;
  });

  form.on('submit(save)', function(){
    var acl = $('#acl-editor').val();
    if(!acl.trim()){
      layer.msg('ACL 内容为空', {icon: 2});
      return false;
    }
    layer.load();
    $.ajax({
      url: '/api/acl/save_acl',
      type: 'POST',
      data: { acl: acl },
      success: function(res){
        layer.closeAll('loading');
        if(res.code === '0'){
          showStatus('保存成功，headscale 已重载', true);
        } else {
          layer.msg(res.msg, {icon: 2});
        }
      },
      error: function(){
        layer.closeAll('loading');
        layer.msg('网络错误', {icon: 2});
      }
    });
    return false;
  });

  form.on('submit(reload)', function(){
    layer.load();
    $.post('/api/acl/reload', function(res){
      layer.closeAll('loading');
      if(res.code === '0'){
        showStatus('重载成功', true);
      } else {
        layer.msg('重载失败: ' + res.msg, {icon: 2});
      }
    });
    return false;
  });

});
</script>
</body>
</html>
