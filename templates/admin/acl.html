{% extends "base.html" %}
{% block title %}ACL 规则{% endblock %}

{% block body %}
<div class="p-6" x-data="aclPage">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm">
    <div class="px-6 py-4 border-b dark:border-gray-700 flex items-center justify-between">
      <span class="font-semibold">访问控制中心</span>
      <div class="flex gap-2">
        <button @click="writeConfig" class="px-3 py-1.5 text-sm rounded-lg bg-primary-500 text-white hover:bg-primary-600">写入配置</button>
        <button @click="readConfig" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">读取配置</button>
        <button @click="reloadConfig" class="px-3 py-1.5 text-sm rounded-lg border dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700">重载配置</button>
      </div>
    </div>
    <div class="p-4">
      <div id="acl-table"></div>
    </div>
  </div>

  <!-- ACL 内容展示弹窗 -->
  <div x-show="showAclModal" class="modal-overlay" @click.self="showAclModal = false" x-transition.opacity>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-3xl max-h-[80vh] overflow-auto" x-transition.scale>
      <div class="flex items-center justify-between px-6 py-4 border-b dark:border-gray-700">
        <h3 class="font-semibold">ACL 配置</h3>
        <button @click="showAclModal = false" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <pre class="p-6 text-sm overflow-x-auto font-mono whitespace-pre-wrap" x-text="aclContent"></pre>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('aclPage', () => ({
    grid: null, showAclModal: false, aclContent: '',

    init() { this.buildTable(); },

    buildTable() {
      var self = this;

      var cols = [
        { name: 'ID', id: 'id', width: '80px' },
        { name: '用户名', id: 'userName', width: '150px' },
        { name: 'ACL', id: 'acl', width: '600px' },
      ];

      this.grid = new gridjs.Grid({
        columns: cols,
        server: {
          url: '/api/acl/getACL',
          then: function(data) {
            var list = data.data || [];
            return list.map(function(r) { return [r.id, r.userName, r.acl]; });
          }
        },
        search: true,
        sort: { multiColumn: false },
        pagination: { limit: 15 },
        language: { search: { placeholder: '搜索...' }, pagination: { showing: '显示', to: '到', of: '共', results: '' } },
        style: { table: { 'white-space': 'nowrap' } },
        className: { table: 'text-sm' }
      }).render(document.getElementById('acl-table'));
    },

    async writeConfig() {
      try {
        var res = await apiPost('/api/acl/rewrite_acl', {});
        showToast(res.msg, res.code === '0' ? 'success' : 'error');
      } catch(e) { showToast('操作失败', 'error'); }
    },

    async readConfig() {
      try {
        var res = await apiPost('/api/acl/read_acl', {});
        if (res.code === '0') {
          this.aclContent = res.data;
          this.showAclModal = true;
        } else { showToast(res.msg, 'error'); }
      } catch(e) { showToast('读取失败', 'error'); }
    },

    async reloadConfig() {
      try {
        var res = await apiPost('/api/acl/reload', {});
        showToast(res.msg, res.code === '0' ? 'success' : 'error');
      } catch(e) { showToast('操作失败', 'error'); }
    },

    refresh() { if (this.grid) this.grid.forceRender(); }
  }));
});
</script>
{% endblock %}
