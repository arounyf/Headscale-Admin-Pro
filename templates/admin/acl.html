<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>访问控制 — ACL 规则</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/static/layui/css/layui.css" rel="stylesheet">
  <link href="/static/adminui/dist/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="layui-fluid">
  <div class="layui-row layui-col-space15">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-header">ACL 策略编辑器
          <span style="margin-left:16px;color:#909399;font-size:12px;font-weight:400;">
            <i class="layui-icon layui-icon-about"></i>
            autogroup:self 自动限定同用户节点+子网路由 · tagged 节点路由全局可见 · per-user primary routes 隔离
          </span>
        </div>
        <div class="layui-card-body">

          <div class="layui-form">
            <div class="layui-form-item">
              <div class="layui-input-block">
                <textarea id="acl-editor" class="layui-textarea" style="font-family:monospace;font-size:13px;min-height:420px;"
                 placeholder="在此编辑 ACL JSON..."></textarea>
              </div>
            </div>
            <div class="layui-form-item">
              <button class="layui-btn" lay-submit lay-filter="read">读取</button>
              <button class="layui-btn layui-btn-normal" lay-submit lay-filter="save">保存</button>
              <button class="layui-btn layui-btn-warm" lay-submit lay-filter="reload">重载</button>
              <span id="status-msg" style="margin-left:12px;color:#67C23A;display:none;"></span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/layui/layui.js"></script>
<script src="/static/csrf.js"></script>
<script>
layui.config({ base: '/static/' }).use(['index', 'form', 'layer'], function(){
  var form = layui.form, $ = layui.$, layer = layui.layer;

  // 页面加载时读取 ACL
  $.post('/api/acl/get_acl', function(res){
    if(res.code === '0'){
      $('#acl-editor').val(res.data);
    } else {
      layer.msg('读取失败: ' + res.msg, {icon: 2});
    }
  });

  function showStatus(msg, ok){
    var el = $('#status-msg');
    el.css('color', ok ? '#67C23A' : '#F56C6C').text(msg).show();
    setTimeout(function(){ el.hide(); }, 3000);
  }

  form.on('submit(read)', function(){
    layer.load();
    $.post('/api/acl/get_acl', function(res){
      layer.closeAll('loading');
      if(res.code === '0'){
        $('#acl-editor').val(res.data);
        showStatus('读取成功', true);
      } else {
        layer.msg('读取失败: ' + res.msg, {icon: 2});
      }
    });
    return false;
  });

  form.on('submit(save)', function(){
    var acl = $('#acl-editor').val();
    if(!acl.trim()){
      layer.msg('ACL 内容为空', {icon: 2});
      return false;
    }
    layer.load();
    $.ajax({
      url: '/api/acl/save_acl',
      type: 'POST',
      data: { acl: acl },
      success: function(res){
        layer.closeAll('loading');
        if(res.code === '0'){
          showStatus('保存成功，headscale 已重载', true);
        } else {
          layer.msg(res.msg, {icon: 2});
        }
      },
      error: function(){
        layer.closeAll('loading');
        layer.msg('网络错误', {icon: 2});
      }
    });
    return false;
  });

  form.on('submit(reload)', function(){
    layer.load();
    $.post('/api/acl/reload', function(res){
      layer.closeAll('loading');
      if(res.code === '0'){
        showStatus('重载成功', true);
      } else {
        layer.msg('重载失败: ' + res.msg, {icon: 2});
      }
    });
    return false;
  });

});
</script>
</body>
</html>
